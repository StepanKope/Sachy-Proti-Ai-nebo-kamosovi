<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ŠKOLNÍ ŠACHY - PROJEKT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>ŠKOLNÍ ŠACHY - PRAVIDLA V PRAXI</h1>

    <div class="game-container">
        <div class="info-panel">
            <div id="status">NA TAHU: BÍLÝ</div>
            
            <div class="timers">
                <div class="clock-box" id="black-clock">ČERNÝ: 10:00</div>
                <div class="clock-box active-turn" id="white-clock">BÍLÝ: 10:00</div>
            </div>

            <div class="move-history">
                <strong>Poslední akce:</strong>
                <div id="msg">Vítejte ve hře!</div>
            </div>

            <div class="controls">
                <button class="btn btn-reset" onclick="resetGame()">Nová hra / Reset</button>
                <button class="btn btn-rules" onclick="window.location.href='rules.html'">Zobrazit pravidla</button>
            </div>
        </div>

        <div class="board" id="board"></div>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const msgEl = document.getElementById('msg');
        let boardState = [];
        let selectedSq = null;
        let turn = 'white';
        let timers = { white: 600, black: 600 };
        let timerInterval = null;

        const initialPos = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        const pieceMap = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                boardState[r] = [...initialPos[r]];
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    sq.dataset.r = r; sq.dataset.c = c;
                    sq.onclick = () => handleSquareClick(r, c);
                    boardEl.appendChild(sq);
                }
            }
            drawPieces();
            if (timerInterval) clearInterval(timerInterval);
            startTimer();
        }

        function drawPieces() {
            document.querySelectorAll('.square').forEach(sq => {
                const r = sq.dataset.r; const c = sq.dataset.c;
                const char = boardState[r][c];
                sq.innerHTML = '';
                if (char) {
                    const span = document.createElement('span');
                    span.innerText = pieceMap[char];
                    span.className = char === char.toUpperCase() ? 'piece-white' : 'piece-black';
                    sq.appendChild(span);
                }
            });
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();
            
            if (selectedSq) {
                if (selectedSq.r === r && selectedSq.c === c) {
                    deselect();
                    return;
                }
                movePiece(selectedSq.r, selectedSq.c, r, c);
            } else {
                if (piece && ((turn === 'white' && isWhite) || (turn === 'black' && !isWhite))) {
                    selectedSq = { r, c };
                    document.querySelector(`[data-r="${r}"][data-c="${c}"]`).classList.add('selected');
                }
            }
        }

        function movePiece(fromR, fromC, toR, toC) {
            const piece = boardState[fromR][fromC];
            const target = boardState[toR][toC];
            const diffR = Math.abs(toR - fromR);
            const diffC = Math.abs(toC - fromC);
            const type = piece.toLowerCase();
            let isLegal = false;

            // Základní ochrana: nebrat vlastní barvu
            if (target && (target === target.toUpperCase()) === (piece === piece.toUpperCase())) {
                deselect();
                return;
            }

            // --- LOGIKA PRAVIDEL ---
            if (type === 'n') { // Jezdec L
                if ((diffR === 2 && diffC === 1) || (diffR === 1 && diffC === 2)) isLegal = true;
            } 
            else if (type === 'b') { // Střelec diagonálně
                if (diffR === diffC) isLegal = true; 
            }
            else if (type === 'r') { // Věž rovně
                if (diffR === 0 || diffC === 0) isLegal = true;
            }
            else if (type === 'q') { // Dáma (vše)
                if (diffR === diffC || diffR === 0 || diffC === 0) isLegal = true;
            }
            else if (type === 'k') { // Král 1 pole
                if (diffR <= 1 && diffC <= 1) isLegal = true;
            }
            else if (type === 'p') { // Pěšec (pohyb + braní + první tah)
                const dir = piece === 'P' ? -1 : 1;
                if (toC === fromC && !target) {
                    if (toR === fromR + dir) isLegal = true;
                    if (((fromR === 6 && piece === 'P') || (fromR === 1 && piece === 'p')) && toR === fromR + (2 * dir)) isLegal = true;
                }
                if (diffC === 1 && toR === fromR + dir && target) isLegal = true;
            }

            if (isLegal) {
                boardState[toR][toC] = piece;
                boardState[fromR][fromC] = '';

                // Proměna pěšce (Povýšení na dámu na konci desky)
                if (type === 'p' && (toR === 0 || toR === 7)) {
                    boardState[toR][toC] = (piece === 'P') ? 'Q' : 'q';
                    msgEl.innerText = "Pěšec proměněn na dámu!";
                }

                switchTurn();
            } else {
                msgEl.innerText = "Neplatný tah dle pravidel!";
                setTimeout(() => msgEl.innerText = "", 2000);
            }

            deselect();
            drawPieces();
        }

        function switchTurn() {
            turn = (turn === 'white') ? 'black' : 'white';
            document.getElementById('status').innerText = `NA TAHU: ${turn === 'white' ? 'BÍLÝ' : 'ČERNÝ'}`;
            document.getElementById('white-clock').classList.toggle('active-turn', turn === 'white');
            document.getElementById('black-clock').classList.toggle('active-turn', turn === 'black');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timers[turn]--;
                updateClockDisplay();
                if (timers[turn] <= 0) {
                    clearInterval(timerInterval);
                    alert("Čas vypršel!");
                    resetGame();
                }
            }, 1000);
        }

        function updateClockDisplay() {
            const format = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            document.getElementById('white-clock').innerText = `BÍLÝ: ${format(timers.white)}`;
            document.getElementById('black-clock').innerText = `ČERNÝ: ${format(timers.black)}`;
        }

        function deselect() {
            document.querySelectorAll('.square').forEach(s => s.classList.remove('selected'));
            selectedSq = null;
        }

        function resetGame() {
            turn = 'white';
            timers = { white: 600, black: 600 };
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
