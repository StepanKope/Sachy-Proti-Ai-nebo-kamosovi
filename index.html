<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Školní Šachy PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="letter-spacing: 5px; color: white; margin-bottom: 20px;">ŠKOLNÍ ŠACHY</h1>

    <div class="game-container">
        <div class="info-panel">
            <div id="status" style="color: #f1c40f; font-weight: bold; font-size: 1.2rem; text-align: center;">NA TAHU: BÍLÝ</div>
            
            <div style="margin-top: 10px;">
                <div class="clock-box" id="black-clock">Černý: 10:00</div>
                <div style="text-align: center; margin: 10px 0; color: #777;">VS</div>
                <div class="clock-box active-turn" id="white-clock">Bílý: 10:00</div>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: auto;">
                <div id="msg" style="color: #e74c3c; font-size: 0.9rem; text-align: center; min-height: 20px;"></div>
                <button class="btn" onclick="resetGame()">Nová hra</button>
                <button class="btn" style="background: #9b59b6;" onclick="window.location.href='rules.html'">Pravidla</button>
            </div>
        </div>

        <div class="board" id="board"></div>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const msgEl = document.getElementById('msg');
        let boardState = [];
        let selectedSq = null;
        let turn = 'white';
        
        // Hodiny
        let timers = { white: 600, black: 600 };
        let timerInterval = null;

        const initialPos = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        const pieceMap = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                boardState[r] = [...initialPos[r]];
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    sq.dataset.r = r; sq.dataset.c = c;
                    sq.onclick = () => handleSquareClick(r, c);
                    boardEl.appendChild(sq);
                }
            }
            drawPieces();
            startTimer();
        }

        function drawPieces() {
            const squares = document.querySelectorAll('.square');
            squares.forEach(sq => {
                const r = sq.dataset.r; const c = sq.dataset.c;
                const char = boardState[r][c];
                sq.innerHTML = '';
                if (char) {
                    const span = document.createElement('span');
                    span.innerText = pieceMap[char];
                    span.className = char === char.toUpperCase() ? 'piece-white' : 'piece-black';
                    sq.appendChild(span);
                }
            });
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();
            
            if (selectedSq) {
                if (selectedSq.r === r && selectedSq.c === c) {
                    deselect();
                    return;
                }
                movePiece(selectedSq.r, selectedSq.c, r, c);
            } else {
                if (piece && ((turn === 'white' && isWhite) || (turn === 'black' && !isWhite))) {
                    selectedSq = { r, c };
                    document.querySelector(`[data-r="${r}"][data-c="${c}"]`).classList.add('selected');
                }
            }
        }

        function movePiece(fromR, fromC, toR, toC) {
            const piece = boardState[fromR][fromC];
            const target = boardState[toR][toC];
            const diffR = Math.abs(toR - fromR);
            const diffC = Math.abs(toC - fromC);

            if (target && (target === target.toUpperCase()) === (piece === piece.toUpperCase())) {
                deselect();
                return;
            }

            let isLegal = false;
            const type = piece.toLowerCase();

            // Pravidla pohybu figur
            if (type === 'n') { 
                if ((diffR === 2 && diffC === 1) || (diffR === 1 && diffC === 2)) isLegal = true;
            } 
            else if (type === 'b') { 
                if (diffR === diffC) isLegal = true; 
            }
            else if (type === 'r') { 
                if (diffR === 0 || diffC === 0) isLegal = true;
            }
            else if (type === 'q') { 
                if (diffR === diffC || diffR === 0 || diffC === 0) isLegal = true;
            }
            else if (type === 'k') { 
                if (diffR <= 1 && diffC <= 1) isLegal = true;
            }
            else if (type === 'p') { 
                const dir = piece === 'P' ? -1 : 1;
                if (toC === fromC && !target) {
                    if (toR === fromR + dir) isLegal = true;
                    if (((fromR === 6 && piece === 'P') || (fromR === 1 && piece === 'p')) && toR === fromR + (2 * dir)) isLegal = true;
                }
                if (diffC === 1 && toR === fromR + dir && target) isLegal = true;
            }

            if (isLegal) {
                boardState[toR][toC] = piece;
                boardState[fromR][fromC] = '';
                switchTurn();
                msgEl.innerText = "";
            } else {
                msgEl.innerText = "Neplatný tah!";
                setTimeout(() => msgEl.innerText = "", 2000);
            }

            deselect();
            drawPieces();
        }

        function switchTurn() {
            turn = (turn === 'white') ? 'black' : 'white';
            document.getElementById('status').innerText = `NA TAHU: ${turn === 'white' ? 'BÍLÝ' : 'ČERNÝ'}`;
            
            // Vizuální přepnutí aktivních hodin
            document.getElementById('white-clock').classList.toggle('active-turn', turn === 'white');
            document.getElementById('black-clock').classList.toggle('active-turn', turn === 'black');
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timers[turn]--;
                updateClockDisplay();
                if (timers[turn] <= 0) {
                    clearInterval(timerInterval);
                    alert("Čas vypršel! Hra končí.");
                }
            }, 1000);
        }

        function updateClockDisplay() {
            const format = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            document.getElementById('white-clock').innerText = `Bílý: ${format(timers.white)}`;
            document.getElementById('black-clock').innerText = `Černý: ${format(timers.black)}`;
        }

        function deselect() {
            document.querySelectorAll('.square').forEach(s => s.classList.remove('selected'));
            selectedSq = null;
        }

        function resetGame() {
            turn = 'white';
            timers = { white: 600, black: 600 };
            document.getElementById('status').innerText = "NA TAHU: BÍLÝ";
            document.getElementById('white-clock').classList.add('active-turn');
            document.getElementById('black-clock').classList.remove('active-turn');
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
