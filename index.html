<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Šachy</title>
    <style>
        :root {
            --white-sq: #ebecd0;
            --black-sq: #779556;
            --square-size: 80px; 
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            /* Background Image Setup */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://wallpaperaccess.com/full/1150495.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Container for everything to keep it organized */
        .game-wrapper {
            background: rgba(0, 0, 0, 0.6); /* Semi-transparent dark box */
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px); /* Blurs the wallpaper slightly behind the board */
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        h1 {
            letter-spacing: 15px;
            margin: 0 0 30px 0;
            text-align: center;
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .main-layout {
            display: flex;
            align-items: flex-start;
            gap: 50px;
        }

        .game-area {
            display: grid;
            grid-template-columns: 40px auto;
            grid-template-rows: auto 40px;
        }

        .numbers-axis {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .letters-axis {
            grid-column: 2;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            padding-top: 10px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, var(--square-size));
            grid-template-rows: repeat(8, var(--square-size));
            border: 8px solid #34495e;
            border-radius: 4px;
        }

        .square {
            width: var(--square-size);
            height: var(--square-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            cursor: pointer;
        }

        .white { background-color: var(--white-sq); }
        .black { background-color: var(--black-sq); }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: center;
            height: 100%;
        }

        .btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 20px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn:hover {
            background-color: #d35400;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        .btn-ai { background-color: #3498db; }
        .btn-ai:hover { background-color: #2980b9; }

        .piece-black { color: #000; filter: drop-shadow(0 0 1px #fff); }
        .piece-white { color: #fff; filter: drop-shadow(0 0 2px #000); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1>ŠACHY</h1>

        <div class="main-layout">
            <div class="game-area">
                <div class="numbers-axis">
                    <div>8</div><div>7</div><div>6</div><div>5</div>
                    <div>4</div><div>3</div><div>2</div><div>1</div>
                </div>

                <div class="board" id="board"></div>

                <div class="letters-axis">
                    <div>A</div><div>B</div><div>C</div><div>D</div>
                    <div>E</div><div>F</div><div>G</div><div>H</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn" onclick="alert('Hra proti kámošovi!')">Proti kámošovi</button>
                <button class="btn btn-ai" onclick="alert('AI se připravuje...')">Proti AI</button>
            </div>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const initialPieces = {
            '8': ['♜', '♞', '♝', '♛', '♚', '♝', '♞', '♜'],
            '7': ['♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟'],
            '2': ['♙', '♙', '♙', '♙', '♙', '♙', '♙', '♙'],
            '1': ['♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖']
        };

        for (let r = 8; r >= 1; r--) {
            for (let c = 0; c < 8; c++) {
                const square = document.createElement('div');
                const isWhiteSquare = (r + c) % 2 !== 0;
                square.className = `square ${isWhiteSquare ? 'white' : 'black'}`;
                
                if (initialPieces[r]) {
                    const piece = initialPieces[r][c];
                    const pieceClass = (r > 4) ? 'piece-black' : 'piece-white';
                    const span = document.createElement('span');
                    span.className = pieceClass;
                    span.innerText = piece;
                    square.appendChild(span);
                }
                board.appendChild(square);
            }
        }
    </script>
</body>
</html>
