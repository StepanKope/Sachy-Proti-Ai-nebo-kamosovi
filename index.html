<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Šachy</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --board-border: #34495e;
            --white-sq: #ebecd0;
            --black-sq: #779556;
            --text-color: #ecf0f1;
            --square-size: 80px; 
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center; /* This centers the title and content */
            padding-top: 30px;
            margin: 0;
        }

        h1 {
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-align: center; /* Title centered */
            width: 100%;
        }

        .main-layout {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
        }

        .game-area {
            display: grid;
            grid-template-columns: 30px auto;
            grid-template-rows: auto 30px;
        }

        .numbers-axis {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            font-weight: bold;
            padding-right: 5px;
        }

        .letters-axis {
            grid-column: 2;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-weight: bold;
            padding-top: 5px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, var(--square-size));
            grid-template-rows: repeat(8, var(--square-size));
            border: 5px solid var(--board-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .square {
            width: var(--square-size);
            height: var(--square-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px; /* Size of the chess pieces */
            cursor: pointer;
            user-select: none;
        }

        .white { background-color: var(--white-sq); }
        .black { background-color: var(--black-sq); }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-top: 5px;
        }

        .btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            min-width: 180px;
        }

        .btn:hover {
            background-color: #d35400;
            transform: scale(1.05);
        }

        .btn-ai { background-color: #3498db; }
        .btn-ai:hover { background-color: #2980b9; }

        /* Style for Black pieces color */
        .piece-black { color: #000; }
        /* Style for White pieces color */
        .piece-white { color: #fff; text-shadow: 0 0 2px #000; }
    </style>
</head>
<body>

    <h1>ŠACHY</h1>

    <div class="main-layout">
        <div class="game-area">
            <div class="numbers-axis">
                <div>8</div><div>7</div><div>6</div><div>5</div>
                <div>4</div><div>3</div><div>2</div><div>1</div>
            </div>

            <div class="board" id="board"></div>

            <div class="letters-axis">
                <div>A</div><div>B</div><div>C</div><div>D</div>
                <div>E</div><div>F</div><div>G</div><div>H</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="alert('Hra proti kámošovi začíná!')">Proti kámošovi</button>
            <button class="btn btn-ai" onclick="alert('AI se připravuje...')">Proti AI</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        
        // Piece layout mapping
        const initialPieces = {
            '8': ['♜', '♞', '♝', '♛', '♚', '♝', '♞', '♜'],
            '7': ['♟', '♟', '♟', '♟', '♟', '♟', '♟', '♟'],
            '2': ['♙', '♙', '♙', '♙', '♙', '♙', '♙', '♙'],
            '1': ['♖', '♘', '♗', '♕', '♔', '♗', '♘', '♖']
        };

        for (let r = 8; r >= 1; r--) {
            for (let c = 0; c < 8; c++) {
                const square = document.createElement('div');
                const isWhiteSquare = (r + c) % 2 !== 0;
                square.className = `square ${isWhiteSquare ? 'white' : 'black'}`;
                
                const colLetter = String.fromCharCode(65 + c);
                square.id = colLetter + r;

                // Logic to place pieces
                let piece = "";
                let pieceClass = "";

                if (initialPieces[r]) {
                    piece = initialPieces[r][c];
                    // CSS class for coloring (rows 7-8 are black pieces, 1-2 are white)
                    pieceClass = (r > 4) ? 'piece-black' : 'piece-white';
                }

                if (piece) {
                    const pieceSpan = document.createElement('span');
                    pieceSpan.className = pieceClass;
                    pieceSpan.innerText = piece;
                    square.appendChild(pieceSpan);
                }
                
                board.appendChild(square);
            }
        }
    </script>

</body>
</html>
