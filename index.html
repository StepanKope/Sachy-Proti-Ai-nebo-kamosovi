<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ŠKOLNÍ ŠACHY - ROŠÁDA & ČAS</title>
    <style>
        :root {
            --white-sq: #f0d9b5;
            --black-sq: #b58863;
            --square-size: 70px;
            --accent: #27ae60;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://t3.ftcdn.net/jpg/18/06/45/26/360_F_1806452627_gLpxNyDgzk2WbcSKTGwLKFvE9YjqftnZ.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-title { font-size: 3rem; letter-spacing: 10px; margin-bottom: 20px; text-shadow: 0 0 20px rgba(0,0,0,1); }

        .game-container {
            display: flex;
            gap: 40px;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 25px;
            border: 3px solid #555;
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
        }

        .info-panel { width: 250px; display: flex; flex-direction: column; gap: 15px; }

        #status {
            background: #2c3e50; padding: 15px; text-align: center;
            font-weight: bold; font-size: 1.2rem; border-radius: 12px;
            color: #f1c40f; border: 1px solid #444;
        }

        .clock-box {
            background: #1a1a1a; padding: 10px; text-align: center;
            border-radius: 10px; font-family: 'Courier New', monospace;
            font-size: 1.3rem; border: 2px solid transparent;
        }

        .active-turn { border-color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }

        /* VÝBĚR ČASU */
        .time-selector {
            display: flex;
            justify-content: space-between;
            gap: 5px;
        }
        .time-btn {
            flex: 1;
            padding: 8px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .time-btn.selected-time { background: var(--accent); border-color: white; }

        .board { display: grid; grid-template-columns: repeat(8, var(--square-size)); grid-template-rows: repeat(8, var(--square-size)); border: 12px solid #333; }

        .square { width: var(--square-size); height: var(--square-size); display: flex; align-items: center; justify-content: center; font-size: 55px; cursor: pointer; position: relative; }
        .white { background-color: var(--white-sq); }
        .black { background-color: var(--black-sq); }
        .selected { background-color: #f1c40f !important; }
        .check { background-color: #e74c3c !important; }

        .hint::after {
            content: ''; width: 20px; height: 20px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 50%; position: absolute; z-index: 10;
        }

        .piece-black { color: #000; filter: drop-shadow(0 0 1px #fff); z-index: 5; }
        .piece-white { color: #fff; filter: drop-shadow(0 0 2px #000); z-index: 5; }

        .btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-reset { background: var(--accent); color: white; }
        .btn-rules { background: #9b59b6; color: white; }

        #msg { color: #ff7675; text-align: center; min-height: 24px; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

    <h1 class="main-title">ŠKOLNÍ ŠACHY</h1>

    <div class="game-container">
        <div class="info-panel">
            <div id="status">BÍLÝ ZAČÍNÁ</div>
            
            <div class="time-selector">
                <button class="time-btn" onclick="setTime(60, this)">1m</button>
                <button class="time-btn" onclick="setTime(180, this)">3m</button>
                <button class="time-btn selected-time" onclick="setTime(600, this)">10m</button>
            </div>

            <div id="black-clock" class="clock-box">ČERNÝ: 10:00</div>
            <div id="white-clock" class="clock-box active-turn">BÍLÝ: 10:00</div>
            
            <div id="msg"></div>
            
            <button class="btn btn-reset" onclick="resetGame()">Nová hra</button>
            <button class="btn btn-rules" onclick="window.location.href='rules.html'">Pravidla</button>
        </div>
        <div class="board" id="board"></div>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        const msgEl = document.getElementById('msg');
        let boardState = [];
        let selectedSq = null;
        let turn = 'white';
        let baseTime = 600;
        let timers = { white: 600, black: 600 };
        let timerInterval = null;

        // Pro rošádu: sledování pohybu králů a věží
        let moved = { K: false, k: false, R1: false, R8: false, r1: false, r8: false };

        const initialPos = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        const pieceMap = { 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙' };

        function setTime(seconds, btn) {
            document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected-time'));
            btn.classList.add('selected-time');
            baseTime = seconds;
            resetGame();
        }

        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                boardState[r] = [...initialPos[r]];
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    sq.id = `sq-${r}-${c}`;
                    sq.dataset.r = r; sq.dataset.c = c;
                    sq.onclick = () => handleSquareClick(r, c);
                    boardEl.appendChild(sq);
                }
            }
            drawPieces();
            if (timerInterval) clearInterval(timerInterval);
            startTimer();
        }

        function drawPieces() {
            document.querySelectorAll('.square').forEach(sq => {
                const r = sq.dataset.r; const c = sq.dataset.c;
                const char = boardState[r][c];
                sq.innerHTML = '';
                sq.classList.remove('check');
                if (char) {
                    const span = document.createElement('span');
                    span.innerText = pieceMap[char];
                    span.className = char === char.toUpperCase() ? 'piece-white' : 'piece-black';
                    sq.appendChild(span);
                    if (char.toLowerCase() === 'k' && isKingInCheck(char === 'K' ? 'white' : 'black')) {
                        sq.classList.add('check');
                    }
                }
            });
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();
            
            if (selectedSq) {
                if (isMoveLegal(selectedSq.r, selectedSq.c, r, c)) {
                    movePiece(selectedSq.r, selectedSq.c, r, c);
                } else {
                    deselect();
                    if (piece && ((turn === 'white' && isWhite) || (turn === 'black' && !isWhite))) {
                        selectPiece(r, c);
                    }
                }
            } else {
                if (piece && ((turn === 'white' && isWhite) || (turn === 'black' && !isWhite))) {
                    selectPiece(r, c);
                }
            }
        }

        function selectPiece(r, c) {
            selectedSq = { r, c };
            document.getElementById(`sq-${r}-${c}`).classList.add('selected');
            showHints(r, c);
        }

        function showHints(fromR, fromC) {
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (isMoveLegal(fromR, fromC, r, c)) {
                        document.getElementById(`sq-${r}-${c}`).classList.add('hint');
                    }
                }
            }
        }

        function isPathClear(fR, fC, tR, tC) {
            let dr = Math.sign(tR - fR);
            let dc = Math.sign(tC - fC);
            let currR = fR + dr;
            let currC = fC + dc;
            while (currR !== tR || currC !== tC) {
                if (boardState[currR][currC] !== '') return false;
                currR += dr;
                currC += dc;
            }
            return true;
        }

        function isMoveLegal(fromR, fromC, toR, toC) {
            const piece = boardState[fromR][fromC];
            const target = boardState[toR][toC];
            const dr = Math.abs(toR - fromR);
            const dc = Math.abs(toC - fromC);
            const type = piece.toLowerCase();

            if (target && (target === target.toUpperCase()) === (piece === piece.toUpperCase())) return false;

            if (type === 'n') return (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
            if (type === 'r' || type === 'b' || type === 'q') {
                if (type === 'r' && (dr !== 0 && dc !== 0)) return false;
                if (type === 'b' && dr !== dc) return false;
                if (type === 'q' && (dr !== dc && dr !== 0 && dc !== 0)) return false;
                return isPathClear(fromR, fromC, toR, toC);
            }

            if (type === 'k') {
                // Klasický pohyb
                if (dr <= 1 && dc <= 1) return true;
                // ROŠÁDA
                if (dr === 0 && dc === 2 && !moved[piece]) {
                    const isWhite = piece === 'K';
                    const r = isWhite ? 7 : 0;
                    if (toC === 6) { // Krátká
                        return !moved[isWhite ? 'R8' : 'r8'] && isPathClear(r, 4, r, 7) && !isKingInCheck(turn);
                    }
                    if (toC === 2) { // Dlouhá
                        return !moved[isWhite ? 'R1' : 'r1'] && isPathClear(r, 4, r, 0) && !isKingInCheck(turn);
                    }
                }
            }

            if (type === 'p') {
                const dir = piece === 'P' ? -1 : 1;
                if (dc === 0 && !target) {
                    if (toR === fromR + dir) return true;
                    if (((fromR === 6 && piece === 'P') || (fromR === 1 && piece === 'p')) && toR === fromR + (2 * dir)) {
                        return boardState[fromR + dir][fromC] === '';
                    }
                }
                if (dc === 1 && toR === fromR + dir && target) return true;
            }
            return false;
        }

        function isKingInCheck(color) {
            let kingPos = null;
            let kingChar = color === 'white' ? 'K' : 'k';
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    if(boardState[r][c] === kingChar) kingPos = {r, c};
                }
            }
            if(!kingPos) return false;
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    let p = boardState[r][c];
                    if(p !== '' && (p === p.toUpperCase()) !== (color === 'white')) {
                        // Simulace bez rekurze šachu
                        const dr = Math.abs(kingPos.r - r);
                        const dc = Math.abs(kingPos.c - c);
                        const type = p.toLowerCase();
                        let canAttack = false;
                        if (type === 'n') canAttack = (dr === 2 && dc === 1) || (dr === 1 && dc === 2);
                        else if (type === 'r') canAttack = (dr === 0 || dc === 0) && isPathClear(r, c, kingPos.r, kingPos.c);
                        else if (type === 'b') canAttack = (dr === dc) && isPathClear(r, c, kingPos.r, kingPos.c);
                        else if (type === 'q') canAttack = (dr === dc || dr === 0 || dc === 0) && isPathClear(r, c, kingPos.r, kingPos.c);
                        else if (type === 'k') canAttack = dr <= 1 && dc <= 1;
                        else if (type === 'p') canAttack = dc === 1 && kingPos.r === r + (p === 'P' ? -1 : 1);
                        
                        if (canAttack) return true;
                    }
                }
            }
            return false;
        }

        function movePiece(fromR, fromC, toR, toC) {
            const piece = boardState[fromR][fromC];
            const oldTarget = boardState[toR][toC];
            
            // Logika rošády - pohnutí věží
            if (piece.toLowerCase() === 'k' && Math.abs(toC - fromC) === 2) {
                const isWhite = piece === 'K';
                const row = isWhite ? 7 : 0;
                if (toC === 6) { // Krátká: věž z 7 na 5
                    boardState[row][5] = boardState[row][7]; boardState[row][7] = '';
                } else if (toC === 2) { // Dlouhá: věž z 0 na 3
                    boardState[row][3] = boardState[row][0]; boardState[row][0] = '';
                }
            }

            boardState[toR][toC] = piece;
            boardState[fromR][fromC] = '';
            
            if (isKingInCheck(turn)) {
                // Vracení tahu (v šachu) - u rošády by to bylo složitější, ale tohle je základ
                boardState[fromR][fromC] = piece; boardState[toR][toC] = oldTarget;
                msgEl.innerText = "Tah do šachu!"; deselect(); return;
            }

            // Sledování pohybu pro budoucí rošády
            if (piece === 'K') moved.K = true; if (piece === 'k') moved.k = true;
            if (fromR === 7 && fromC === 0) moved.R1 = true; if (fromR === 7 && fromC === 7) moved.R8 = true;
            if (fromR === 0 && fromC === 0) moved.r1 = true; if (fromR === 0 && fromC === 7) moved.r8 = true;

            if (piece.toLowerCase() === 'p' && (toR === 0 || toR === 7)) boardState[toR][toC] = piece === 'P' ? 'Q' : 'q';

            switchTurn();
            deselect();
            drawPieces();
            msgEl.innerText = isKingInCheck(turn) ? "ŠACH!" : "";
        }

        function switchTurn() {
            turn = turn === 'white' ? 'black' : 'white';
            document.getElementById('status').innerText = turn === 'white' ? "TAH: BÍLÝ" : "TAH: ČERNÝ";
            document.getElementById('white-clock').classList.toggle('active-turn', turn === 'white');
            document.getElementById('black-clock').classList.toggle('active-turn', turn === 'black');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timers[turn]--;
                const fmt = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
                document.getElementById('white-clock').innerText = `BÍLÝ: ${fmt(timers.white)}`;
                document.getElementById('black-clock').innerText = `ČERNÝ: ${fmt(timers.black)}`;
                if (timers[turn] <= 0) { clearInterval(timerInterval); alert("Čas vypršel!"); resetGame(); }
            }, 1000);
        }

        function deselect() {
            document.querySelectorAll('.square').forEach(s => { s.classList.remove('selected', 'hint'); });
            selectedSq = null;
        }

        function resetGame() {
            turn = 'white';
            timers = { white: baseTime, black: baseTime };
            moved = { K: false, k: false, R1: false, R8: false, r1: false, r8: false };
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
