<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Školní Šachy</title>
    <style>
        :root {
            --white-sq: #ebecd0;
            --black-sq: #779556;
            --square-size: 70px; 
            --accent: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://t3.ftcdn.net/jpg/18/06/45/26/360_F_1806452627_gLpxNyDgzk2WbcSKTGwLKFvE9YjqftnZ.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-wrapper {
            background: rgba(0, 0, 0, 0.8);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        h1 { letter-spacing: 8px; margin: 0 0 15px 0; font-size: 2.2rem; }

        .main-layout { display: flex; gap: 25px; }

        /* Left Sidebar */
        .sidebar { display: flex; flex-direction: column; gap: 10px; width: 140px; }
        .timer-btn {
            background: #34495e; color: white; border: 1px solid #555;
            padding: 8px; cursor: pointer; border-radius: 5px; font-weight: bold;
        }
        .active-mode { background: var(--accent) !important; border-color: white; }
        
        .clock { font-size: 1.4rem; font-family: monospace; text-align: center; margin: 5px 0; }
        .active-clock { color: #f1c40f; text-shadow: 0 0 8px #f1c40f; }

        /* Board */
        .board {
            display: grid;
            grid-template-columns: repeat(8, var(--square-size));
            grid-template-rows: repeat(8, var(--square-size));
            border: 5px solid #2c3e50;
        }

        .square {
            width: var(--square-size);
            height: var(--square-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
        }
        .white { background-color: var(--white-sq); }
        .black { background-color: var(--black-sq); }
        .selected { background-color: #f1c40f !important; }

        /* Pieces */
        .piece-black { color: #000; filter: drop-shadow(0 0 1px #fff); }
        .piece-white { color: #fff; filter: drop-shadow(0 0 2px #000); }

        /* Controls */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        .btn {
            background-color: var(--accent); color: white; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }
        .btn-rules { background-color: #9b59b6; }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <h1 id="main-title">ŠKOLNÍ ŠACHY</h1>
        <div id="status" style="margin-bottom: 10px; font-weight: bold; color: #f1c40f;">TAH: BÍLÝ</div>

        <div class="main-layout">
            <div class="sidebar">
                <button class="timer-btn" onclick="setTimer(60)">1 Minuta</button>
                <button class="timer-btn" onclick="setTimer(180)">3 Minuty</button>
                <button class="timer-btn" onclick="setTimer(600)">10 Minut</button>
                <button class="timer-btn active-mode" id="no-limit-btn" onclick="setTimer(null)">Bez limitu</button>
                
                <div style="background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; margin-top: 10px;">
                    <div id="clock-black" class="clock">--:--</div>
                    <div style="text-align: center; font-size: 0.7rem; color: #aaa;">VS</div>
                    <div id="clock-white" class="clock">--:--</div>
                </div>
            </div>

            <div class="board" id="board"></div>

            <div class="controls">
                <button class="btn" onclick="resetGame()">Restart hry</button>
                <button class="btn btn-rules" onclick="showRules()">Pravidla</button>
                <div id="msg" style="font-size: 0.8rem; color: #ff7675; width: 150px;"></div>
            </div>
        </div>
    </div>

    <script>
        const boardEl = document.getElementById('board');
        let boardState = [];
        let selectedSq = null;
        let turn = 'white';
        let timers = { white: null, black: null };
        let interval = null;

        const initialPos = [
            ['r','n','b','q','k','b','n','r'],
            ['p','p','p','p','p','p','p','p'],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['','','','','','','',''],
            ['P','P','P','P','P','P','P','P'],
            ['R','N','B','Q','K','B','N','R']
        ];

        const pieceMap = {
            'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚', 'p': '♟',
            'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔', 'P': '♙'
        };

        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                boardState[r] = [...initialPos[r]];
                for (let c = 0; c < 8; c++) {
                    const sq = document.createElement('div');
                    sq.className = `square ${(r + c) % 2 === 0 ? 'white' : 'black'}`;
                    sq.dataset.r = r; sq.dataset.c = c;
                    sq.onclick = () => handleSquareClick(r, c);
                    boardEl.appendChild(sq);
                }
            }
            drawPieces();
        }

        function drawPieces() {
            const squares = document.querySelectorAll('.square');
            squares.forEach(sq => {
                const r = sq.dataset.r; const c = sq.dataset.c;
                const char = boardState[r][c];
                sq.innerHTML = '';
                if (char) {
                    const span = document.createElement('span');
                    span.innerText = pieceMap[char];
                    span.className = char === char.toUpperCase() ? 'piece-white' : 'piece-black';
                    sq.appendChild(span);
                }
            });
        }

        function handleSquareClick(r, c) {
            const piece = boardState[r][c];
            const isWhite = piece && piece === piece.toUpperCase();
            
            if (selectedSq) {
                if (selectedSq.r === r && selectedSq.c === c) {
                    deselect();
                    return;
                }
                movePiece(selectedSq.r, selectedSq.c, r, c);
            } else {
                if (piece && ((turn === 'white' && isWhite) || (turn === 'black' && !isWhite))) {
                    selectedSq = { r, c };
                    document.querySelector(`[data-r="${r}"][data-c="${c}"]`).classList.add('selected');
                }
            }
        }

        function movePiece(fromR, fromC, toR, toC) {
            // Simplified rule check (Logic from your Python rules)
            const movingPiece = boardState[fromR][fromC];
            const targetPiece = boardState[toR][toC];
            
            // Basic check: can't capture own piece
            if (targetPiece && (targetPiece === targetPiece.toUpperCase()) === (movingPiece === movingPiece.toUpperCase())) {
                deselect();
                return;
            }

            // Perform Move
            boardState[toR][toC] = movingPiece;
            boardState[fromR][fromC] = '';
            
            turn = turn === 'white' ? 'black' : 'white';
            document.getElementById('status').innerText = `TAH: ${turn === 'white' ? 'BÍLÝ' : 'ČERNÝ'}`;
            
            deselect();
            drawPieces();
            updateClockDisplay();
        }

        function deselect() {
            document.querySelectorAll('.square').forEach(s => s.classList.remove('selected'));
            selectedSq = null;
        }

        function setTimer(sec) {
            clearInterval(interval);
            timers.white = sec; timers.black = sec;
            document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active-mode'));
            if (!sec) {
                document.getElementById('no-limit-btn').classList.add('active-mode');
            }
            updateClockDisplay();
            if (sec) {
                interval = setInterval(() => {
                    if (timers[turn] > 0) {
                        timers[turn]--;
                        updateClockDisplay();
                    }
                }, 1000);
            }
        }

        function updateClockDisplay() {
            const fmt = (s) => s === null ? "--:--" : `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
            document.getElementById('clock-white').innerText = fmt(timers.white);
            document.getElementById('clock-black').innerText = fmt(timers.black);
            document.getElementById('clock-white').classList.toggle('active-clock', turn === 'white' && timers.white !== null);
            document.getElementById('clock-black').classList.toggle('active-clock', turn === 'black' && timers.black !== null);
        }

        function showRules() {
            window.alert("Pravidla:\n- Král: 1 pole\n- Dáma: kamkoliv\n- Jezdec: do L\n- Pěšec: o 1 pole (o 2 na startu)");
        }

        function resetGame() {
            turn = 'white';
            createBoard();
            setTimer(timers.white);
        }

        createBoard();
    </script>
</body>
</html>
