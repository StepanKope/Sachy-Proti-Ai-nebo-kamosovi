<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>{{ rules.title }}</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://t3.ftcdn.net/jpg/18/06/45/26/360_F_1806452627_gLpxNyDgzk2WbcSKTGwLKFvE9YjqftnZ.jpg');
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .container {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            max-width: 800px;
            border: 1px solid #27ae60;
        }
        h1 { color: #27ae60; text-align: center; letter-spacing: 5px; }
        h2 { border-bottom: 2px solid #27ae60; padding-bottom: 10px; margin-top: 30px; }
        .piece-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            margin-top: 20px;
        }
        .piece-name { font-weight: bold; color: #f1c40f; }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #27ae60;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid #27ae60;
            padding: 10px 20px;
            border-radius: 5px;
        }
        .back-btn:hover { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ rules.title }}</h1>
        
        <h2>Pohyb figur</h2>
        <div class="piece-grid">
            {% for piece in rules.pieces %}
                <div class="piece-name">{{ piece.name }}</div>
                <div class="piece-desc">{{ piece.move }}</div>
            {% endfor %}
        </div>

        <h2>Speciální tahy</h2>
        <ul>
            {% for move in rules.special_moves %}
                <li>{{ move }}</li>
            {% endfor %}
        </ul>

        <a href="/" class="back-btn">← Zpět ke hře</a>
    </div>
</body>
</html>
