<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Šachy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            margin-top: 50px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .chess-container {
            display: grid;
            /* 8 columns of 60px each */
            grid-template-columns: repeat(8, 60px);
            /* 8 rows of 60px each */
            grid-template-rows: repeat(8, 60px);
            border: 10px solid #34495e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .square {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            user-select: none;
        }

        /* Standard Chess Colors */
        .white {
            background-color: #ebecd0;
            color: #779556;
        }

        .black {
            background-color: #779556;
            color: #ebecd0;
        }

        /* Decorative footer */
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>ŠACHY</h1>

    <div class="chess-container" id="board">
        </div>

    <div class="footer">Souřadnice A1 až H8</div>

    <script>
        const board = document.getElementById('board');
        const cols = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        
        // Loop through rows 8 down to 1
        for (let r = 8; r >= 1; r--) {
            // Loop through columns A to H
            for (let c = 0; c < 8; c++) {
                const square = document.createElement('div');
                
                // Determine color: (Row + Column Index)
                // If even, it's white. If odd, it's black.
                const isWhite = (r + c) % 2 !== 0;
                square.className = `square ${isWhite ? 'white' : 'black'}`;
                
                // Add the notation (e.g., A8, B8...)
                square.innerText = cols[c] + r;
                
                board.appendChild(square);
            }
        }
    </script>

</body>
</html>
